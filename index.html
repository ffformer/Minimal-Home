<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Minimal Home | 家具系列</title>
  <link rel="icon" type="image/png" href="gen-img-1782394791321-7eh1rz.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- 跳过导航链接 -->
  <a href="#main-content" class="skip-link">跳转到主要内容</a>

  <!-- ===== Header ===== -->
  <header class="header" id="header">
    <div class="header__container">
      <a href="#" class="header__logo">
        <img src="gen-img-1782394791321-7eh1rz.png" alt="Minimal Home" class="header__logo-img">
      </a>

      <nav class="header__nav" id="main-nav" aria-label="主导航">
        <ul class="header__nav-list">
          <li><a href="#home" class="header__nav-link header__nav-link--active">首页</a></li>
          <li><a href="#products" class="header__nav-link">商品</a></li>
          <li><a href="#" class="header__nav-link" data-page="about">关于</a></li>
          <li><a href="#" class="header__nav-link" data-page="contact">联系</a></li>
        </ul>
      </nav>

      <div class="header__actions">
        <!-- 购物车按钮 -->
        <button class="header__cart-btn" id="cart-toggle" aria-label="打开购物车">
          <svg class="header__cart-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="header__cart-badge" id="cart-badge" aria-hidden="true">0</span>
        </button>

        <!-- 汉堡按钮 -->
        <button
          class="header__hamburger"
          id="hamburger-btn"
          aria-label="切换菜单"
          aria-expanded="false"
          aria-controls="main-nav"
        >
          <span class="header__hamburger-bar"></span>
          <span class="header__hamburger-bar"></span>
          <span class="header__hamburger-bar"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== 主要内容 ===== -->
  <main id="main-content">

    <!-- ===== Banner ===== -->
    <section class="banner" id="home" aria-label="精选推荐">
      <div class="banner__overlay"></div>
      <div class="banner__content">
        <h1 class="banner__title">简约生活，用心装饰</h1>
        <p class="banner__subtitle">发现那些能改变你空间质感的单品</p>
        <a href="#products" class="banner__cta btn btn--primary">浏览系列</a>
      </div>
    </section>

    <!-- ===== 商品列表 ===== -->
    <section class="products" id="products" aria-label="商品列表">
      <div class="products__container">
        <h2 class="products__heading">我们的系列</h2>

        <!-- 搜索 + 排序工具栏 -->
        <div class="products__toolbar">
          <div class="products__search">
            <svg class="products__search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" class="products__search-input" id="search-input" placeholder="搜索商品..." autocomplete="off">
          </div>
          <div class="products__sort" role="group" aria-label="排序方式">
            <button class="sort-btn sort-btn--active" data-sort="default">默认</button>
            <button class="sort-btn" data-sort="asc">价格↑</button>
            <button class="sort-btn" data-sort="desc">价格↓</button>
          </div>
        </div>

        <!-- 筛选栏 -->
        <div class="products__filters" role="group" aria-label="按标签筛选商品">
          <button class="filter-btn filter-btn--active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="New">New</button>
          <button class="filter-btn" data-filter="Hot">Hot</button>
          <button class="filter-btn" data-filter="Sale">Sale</button>
        </div>

        <!-- 商品网格（JS 动态渲染） -->
        <div class="products__grid" id="product-grid">
          <!-- JS 填充 -->
        </div>
      </div>
    </section>

  </main>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <div class="footer__container">
      <div class="footer__brand">
        <img src="gen-img-1782394791321-7eh1rz.png" alt="Minimal Home" class="footer__logo-img">
        <p class="footer__brand-desc">用心挑选每一件家具，为你的生活空间注入温度。</p>
      </div>
      <div class="footer__links">
        <div class="footer__col">
          <p class="footer__col-title">购物指南</p>
          <a href="#" class="footer__link" data-page="about">关于我们</a>
          <a href="#" class="footer__link" data-page="contact">联系我们</a>
        </div>
        <div class="footer__col">
          <p class="footer__col-title">政策</p>
          <a href="#" class="footer__link" data-page="privacy">隐私政策</a>
          <a href="#" class="footer__link" data-page="terms">服务条款</a>
        </div>
      </div>
    </div>
    <div class="footer__bottom">
      <p class="footer__copyright">&copy; 2026 Minimal Home. All rights reserved.</p>
    </div>
  </footer>

  <!-- ===== Toast 通知容器 ===== -->
  <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- ===== 购物车全屏界面 ===== -->
  <div class="cart-backdrop" id="cart-backdrop"></div>
  <div class="cart-page" id="cart-page" aria-label="购物车">
    <div class="cart-page__header">
      <button class="cart-page__back" id="cart-back" aria-label="返回商品页">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h2 class="cart-page__title">购物车 (<span id="cart-count">0</span>)</h2>
      <div class="cart-page__spacer"></div>
    </div>

    <!-- 空购物车 -->
    <div class="cart-page__empty" id="cart-empty">
      <div class="cart-page__empty-icon">
        <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="var(--color-text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
      </div>
      <p class="cart-page__empty-text">购物车是空的</p>
      <p class="cart-page__empty-hint">快去挑选心仪的家具吧</p>
      <button class="btn btn--primary cart-page__shop-btn" id="cart-empty-shop">去逛逛</button>
    </div>

    <!-- 购物车列表 -->
    <div class="cart-page__body" id="cart-items">
      <!-- JS 填充购物车列表 -->
    </div>

    <!-- 购物车底部结算 -->
    <div class="cart-page__footer" id="cart-footer">
      <div class="cart-page__select-all">
        <label class="cart-page__select-all-label">
          <input type="checkbox" id="cart-select-all" checked>
          <span>全选</span>
        </label>
      </div>
      <div class="cart-page__summary">
        <span class="cart-page__summary-label">合计</span>
        <span class="cart-page__summary-total" id="cart-total">$0</span>
      </div>
      <button class="cart-page__checkout-btn btn btn--primary" id="cart-checkout" disabled>
        去结算
      </button>
    </div>
  </div>

  <!-- ===== 页面内容模态框 ===== -->
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal__header">
      <h2 class="modal__title" id="modal-title"></h2>
      <button class="modal__close" id="modal-close" aria-label="关闭">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal__body" id="modal-body">
      <!-- JS 填充内容 -->
    </div>
  </div>

  <!-- ===== 回到顶部按钮 ===== -->
  <button class="back-to-top" id="back-to-top" aria-label="回到顶部">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <!-- ===== 卡片模板 ===== -->
  <template id="product-card-template">
    <article class="product-card">
      <div class="product-card__image-wrapper">
        <img class="product-card__image" src="" alt="" loading="lazy">
        <span class="product-card__tag"></span>
      </div>
      <div class="product-card__body">
        <h3 class="product-card__title"></h3>
        <p class="product-card__price"></p>
        <button class="product-card__btn btn">加入购物车</button>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
